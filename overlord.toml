# Overlord local instance configuration
instance_name = "Local Overlord"
database_path = "database/.local/Overlord.sqlite"
web_host = "127.0.0.1"
web_port = 4310
sql_studio_enabled = true
sql_studio_host = "127.0.0.1"
sql_studio_port = 4311
sql_studio_binary = "sql-studio"
default_agent = "claude"
# default_model = ""

# Optional workspace agent catalog (merged over bundled defaults on first seed / refresh).
