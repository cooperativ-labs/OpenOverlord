<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta
      name="description"
      content="Open-source management and coordination layer for AI coding agents."
    />
    <meta name="theme-color" content="#101010" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Overlord" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/images/256.png" />
    <title>Overlord</title>
    <script>
      try {
        const theme = localStorage.getItem('overlord-theme') || 'dark';
        const resolved =
          theme === 'system'
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
            : theme;
        if (resolved === 'dark') document.documentElement.classList.add('dark');
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="/runtime-config.js"></script>
    <script type="module" src="/web/main.tsx"></script>
  </body>
</html>
