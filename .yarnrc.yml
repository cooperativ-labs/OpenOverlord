nodeLinker: node-modules

# better-sqlite3 ships a native addon that must be compiled on install.
enableScripts: true

# Allow any git-hosted dependency to run its install scripts.
approvedGitRepositories:
  - "**"

# Do not delay installs of freshly published package versions.
npmMinimalAgeGate: 0

# This tree is synced across macOS and Linux hosts (Syncthing), so the single
# hoisted install must hold native addons for both platforms. Re-run
# `yarn install` after switching machines to rebuild the native better-sqlite3
# addon for the current host.
supportedArchitectures:
  os:
    - current
    - darwin
    - linux
  cpu:
    - current
    - arm64
  libc:
    - current
    - glibc
