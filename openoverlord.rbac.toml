# Overlord default RBAC configuration.
#
# This file defines the default ADMIN and MEMBER roles.
# Copy and edit this file to customize permissions for your instance.
# Supported wildcards: * (all), mission:* (namespace), user_token:self:* (self-scoped).

[roles.ADMIN]
description = "Full instance administrator"
grants = ["*"]

[roles.MEMBER]
description = "Standard user or persistent agent account"
grants = [
  "project:read",
  "mission:*",
  "objective:*",
  "session:*",
  "event:create",
  "event:read",
  "artifact:*",
  "workspace_image:read",
  "user_image:read",
  "user_image:self:*",
  "attachment:*",
  "user_token:self:*",
  "execution_request:create",
  "execution_request:read",
  "execution_request:claim",
]

[roles.PUBLIC]
description = "Unauthenticated public read access"
grants = [
  "workspace_image:read",
  "user_image:read",
]

# Permission groups are named sets of grants that can be referenced in custom
# role definitions. They are not grants themselves — include them explicitly
# in a role's grants list if needed.

[permission_groups.user_management]
description = "Full user lifecycle management"
grants = [
  "user:create",
  "user:update",
  "user:disable",
  "user:delete",
  "role:assign",
  "role:revoke",
]

[permission_groups.member_management]
description = "Workspace member invitation and removal"
grants = [
  "member:invite",
  "member:remove",
  "invitation:read",
  "invitation:revoke",
]

[permission_groups.mission_crud]
description = "Standard mission read/write"
grants = [
  "mission:create",
  "mission:read",
  "mission:update",
  "mission:delete",
]

[permission_groups.workspace_image_crud]
description = "Workspace image management"
grants = [
  "workspace_image:create",
  "workspace_image:read",
  "workspace_image:update",
  "workspace_image:delete",
]

[permission_groups.attachment_crud]
description = "Workspace attachment management"
grants = [
  "attachment:create",
  "attachment:read",
  "attachment:update",
  "attachment:delete",
]

[permission_groups.webhook_management]
description = "Webhook subscription management. ADMIN has this via the wildcard grant; add it to MEMBER's grants list to let non-admins manage webhooks."
grants = [
  "webhook:create",
  "webhook:read",
  "webhook:update",
  "webhook:delete",
]
