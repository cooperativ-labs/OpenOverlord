contractVersion: "0"
componentType: connector
componentKey: codex
label: "Codex Connector"
description: "Codex plugin adapter for the Overlord mission protocol workflow."

connector:
  agentIdentifier: codex
  capabilities:
    - followUpHook
    - permissionHook
    - nativeResume
    - modelFlag
    - effortFlag
    - contextFilePrompt
    - permissionRules
  hookTypes:
    - UserPromptSubmit
    - PermissionRequest
  installPath: "~/.codex/plugins/overlord"
  managedFiles:
    - ".codex-plugin/plugin.json"
    - ".codex-plugin/hooks.json"
    - ".mcp.json"
    - "README.md"
    - "assets/icon.png"
    - "assets/logo.png"
    - "assets/screenshot.svg"
    - "prompt-wrapper.md"
    - "scripts/overlord-mcp.mjs"
    - "scripts/permission-hook.sh"
    - "scripts/user-prompt-submit-hook.sh"
    - "skills/overlord-mission/SKILL.md"
    - "skills/overlord-mission/reference/cli.md"
    - "skills/overlord-mission/reference/record-work.md"
    - "skills/overlord-mission/reference/context.md"
    - "skills/overlord-mission/reference/devices.md"
    - "skills/overlord-mission/reference/mcp.md"
    - "skills/overlord-mission/reference/shell-escaping.md"
