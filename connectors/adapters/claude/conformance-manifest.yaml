contractVersion: "0"
componentType: connector
componentKey: claude
label: "Claude Code Connector"
description: "Claude Code plugin adapter for the Overlord mission protocol workflow."

connector:
  agentIdentifier: claude
  capabilities:
    - followUpHook
    - permissionHook
    - stopHook
    - editHook
    - modelFlag
    - effortFlag
    - contextFilePrompt
    - permissionRules
    - slashCommands
  hookTypes:
    - UserPromptSubmit
    - PermissionRequest
    - PostToolUse
    - Stop
  installPath: "~/.ovld/claude/marketplace/plugins/overlord"
  managedFiles:
    - ".claude-plugin/plugin.json"
    - "README.md"
    - "commands/add-objectives.md"
    - "commands/attach.md"
    - "commands/connect.md"
    - "commands/create.md"
    - "commands/discuss-objective.md"
    - "commands/load.md"
    - "commands/prompt.md"
    - "commands/record-work.md"
    - "commands/spawn.md"
    - "hooks/hooks.json"
    - "scripts/permission-hook.sh"
    - "scripts/post-tool-use-hook.sh"
    - "scripts/stop-hook.sh"
    - "scripts/user-prompt-submit-hook.sh"
    - "skills/overlord-mission/SKILL.md"
    - "skills/overlord-mission/reference/cli.md"
    - "skills/overlord-mission/reference/context.md"
    - "skills/overlord-mission/reference/devices.md"
    - "skills/overlord-mission/reference/mcp.md"
    - "skills/overlord-mission/reference/shell-escaping.md"
    - "prompt-wrapper.md"
