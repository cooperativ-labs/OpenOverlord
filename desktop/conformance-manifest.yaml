# Conformance manifest for the Overlord Desktop Shell.
# Validates against contract/conformance-manifest.schema.yaml.
contractVersion: "0"
componentType: desktop-shell
componentKey: desktop
label: "Overlord Desktop Shell"
description: >
  Optional Electron wrapper around the local OpenOverlord web control center.
  Loads the unmodified webapp SPA in a hardened BrowserWindow over a loopback
  origin, supervises the bundled REST/realtime server as a Node utilityProcess,
  and exposes a minimal feature-detected window.overlord preload bridge. Owns no
  product logic; reuses the rest, cli/runner, and auth surfaces.

desktopShell:
  wrapsModule: "rest"
  supervisedProcesses:
    - "webapp server bundle (utilityProcess)"
    - "ovld runner (optional)"
    - "ovld launch (via the existing execution_request queue / terminal_launcher)"
  bridgeNamespace: "window.overlord"
  packagingTargets:
    - dmg
    - zip
    - AppImage
    - deb
