# Overlord Component Registry
# Machine-readable counterpart to CONTRACT.md "Component Registry" and "Interaction Surfaces"
#
# IMPORTANT: Update this file and CONTRACT.md together when adding components or surfaces.
# Increment contractVersion when any stable interface changes.

contractVersion: '26'

components:
  protocol:
    label: 'Protocol Layer'
    stableIdentifier: protocol
    referenceSpec: 'planning/feature-plans/03-agent-protocol.md'
    owns:
      - 'ovld protocol subcommand names and flags'
      - 'packages/core protocol/service source package: shared service functions, repository helpers, and generated database types'
      - 'session lifecycle: attach → (update|heartbeat)* → (ask|deliver)'
      - 'context assembly format from attach'
      - 'delivery payload structure and validation rules'
      - 'versioned delivery-report evidence normalization and deterministic fallback presentation'
      - 'transactional enqueue of overlord.delivery.compose.v1 worker jobs from deliverSession and recordWork'
      - 'request envelope: per-flag fileInputs map (at most one stdin payload) and change-rationale file_path/filePath alias normalization'
      - 'changed-file and change-rationale recording protocol'
      - 'idempotency key scope naming: protocol.*'
      - 'agent-facing mission lifecycle commands only; runner queue/device/project-resource management commands live on CLI/Runner/REST surfaces'
    dependsOn:
      - database
      - auth
    interactionSurfaces:
      - agentToProtocol
      - protocolToDatabase

  database:
    label: 'Database Layer'
    stableIdentifier: database
    referenceSpec: 'planning/feature-plans/09-database-schema-contract.md'
    owns:
      - 'table definitions, column types, indexes, foreign keys, CHECK constraints'
      - 'organizations table (grouping layer above workspaces) and the required workspaces.organization_id FK; workspaces remain the sole RBAC layer; slugs are unique per organization, not instance-wide'
      - 'controlled vocabularies (closed and open sets)'
      - 'versioned deliveryReport payload storage in deliveries.payload_json; summary remains immutable agent-authored source text'
      - 'worker_jobs durable background queue including core type overlord.delivery.compose.v1'
      - 'project_resources as project-scoped logical identities and project_resource_sources as the sole target/source materialization descriptors (local checkout paths, Git, bundles, or opaque virtual handles); existing resource rows are intentionally discarded by the contract-v4 migration rather than carried through a legacy compatibility shape'
      - 'virtual execution target core tables (execution_target_registrations, project_environment_definitions, project_resource_sources, execution_request_snapshots, execution_request_grants, execution_request_observations, mission_target_resources) and additive execution_requests snapshot/failure/gateway columns; immutable snapshot (payload_json + SHA-256 payload_digest) created in the same transaction as the queued request and never updated; grant records store hashes/opaque IDs, never bearer values'
      - 'soft-delete and revision semantics'
      - 'migration versioning via schema_migrations'
      - 'extension table naming: ext_<name>_'
      - 'logical types and adapter mappings'
    dependsOn: []
    interactionSurfaces:
      - protocolToDatabase
      - restApiToDatabase
      - restApiToDatabase
      - extensionToCore

  cli:
    label: 'CLI Layer'
    stableIdentifier: cli
    referenceSpec: 'planning/feature-plans/02-cli-first-product-surface.md'
    owns:
      - 'management command names and argument shapes'
      - 'ovld setup: interactive first-run configuration for backend target, agent connectors, and terminal launcher'
      - 'ovld serve: boot a fully-initialized local instance in local/backend packages'
      - 'ovld config set: select a local loopback backend URL or hosted/cloud backend URL'
      - 'ovld auth login: first-run backend onboarding before authentication'
      - 'project linking and discovery from working directory, with a packaged-mode fallback to the OS app-data overlord.toml'
      - 'configuration file locations: overlord.toml, .overlord/project.json (legacy resourceId plus additive resourceIdsByExecutionTarget map keyed by execution_targets.id, plus additive resourceKey for logical checkout identity)'
      - 'project resource registration commands: ovld add-cwd --key <resourceKey> upserts a target-scoped local_checkout source on the project-scoped identity; ovld add-url --url <git-url> upserts its project-global git source'
      - 'backend URL settings: backend_url and backend_mode (local/cloud)'
      - 'per-user terminal profiles on user_execution_target_preferences for opening launched agents in a terminal window'
      - 'protocol session-key cache: persists the attach session key by (working directory, mission) and auto-injects --session-key when the flag is absent; cleared at deliver'
      - 'human-readable CLI output format conventions'
    dependsOn:
      - auth
      - rest
    interactionSurfaces:
      - cliToRest

  connector:
    label: 'Connector Layer'
    stableIdentifier: connector
    referenceSpec: 'planning/feature-plans/05-connectors-and-agent-plugins.md'
    owns:
      - 'connector core workflow instructions'
      - 'per-agent plugin/adapter files and managed file manifests'
      - 'hook scripts and their event contracts'
      - 'ovld agent-setup <agent>/all and ovld doctor behavior'
      - 'connector capability declarations and approved capability flag set'
    dependsOn:
      - protocol
    interactionSurfaces:
      - connectorToProtocol

  runner:
    label: 'Runner Layer'
    stableIdentifier: runner
    referenceSpec: 'planning/feature-plans/04-runner-and-launch-execution.md'
    owns:
      - 'execution_requests queue claiming and launch'
      - 'working directory resolution: explicit workingDirectory, objective resource_key on the claiming target, primary target resource, then cwd .overlord/project.json fallback'
      - 'per-mission branch/worktree preparation before local agent spawn when enabled'
      - 'same-mission branch/worktree reuse: an existing planned worktree on the expected mission branch may be reused even when dirty so sequential objectives can continue uncommitted work'
      - 'runner launch environment, including OVERLORD_PROJECT_RESOURCES sibling-resource manifest resolved for the launching target'
      - 'mission branch base resolution for runner preparation: project-configured base first, then the repository main worktree checkout, then the repo default'
      - 'deterministic branch/worktree planning algorithm (cli/src/branch-planning.ts), co-owned with the service layer and pinned to contract/branch-planning-vectors.json'
      - 'ovld runner commands'
      - 'persistent runner service: ovld runner supervise delegates to the same claim-and-launch path as ovld runner once; Postgres runners reconnect queue long-polls immediately after an empty wake/25s timeout while SQLite retains an adaptive polling fallback; ovld runner service <install|start|stop|restart|status|uninstall> manages an OS-level user service (macOS launchd io.overlord.runner, Linux systemd --user overlord-runner.service); local diagnostic state in ~/.ovld/runner-service.json; owner-only service files; Windows deferred'
      - 'execution target selection logic'
      - 'runner queue REST operations used by ovld runner: GET /api/runner/status, POST /api/runner/claim, POST /api/runner/clear, POST /api/runner/requests/:id/launching, POST /api/runner/requests/:id/launched, POST /api/runner/requests/:id/failed'
      - 'branch-preparation acknowledgement through POST /api/missions/:id/branch-prepared'
    dependsOn:
      - database
      - connector
      - rest
    interactionSurfaces:
      - runnerToRest

  rest:
    label: 'REST API Layer'
    stableIdentifier: rest
    referenceSpec: 'planning/feature-plans/09-database-schema-contract.md'
    referenceSection: 'REST API Boundary'
    owns:
      - 'URL paths and HTTP method contracts'
      - 'request/response DTO shapes (camelCase, derived from logical schema)'
      - 'delivery read projection: GET /api/missions/:id/deliveries returns normalized DeliveryDto records and delivery mission events expose an additive deliveryId without raw payload JSON'
      - 'admin-only workspace objective CSV export (GET /api/workspaces/:id/objectives.csv) as a text/csv attachment'
      - 'read-only derived mission branch metadata (MissionBranchDto) from missions.active_branch, predicted via the service layer copy of the branch-planning algorithm (backend/branch-planning.ts) pinned to contract/branch-planning-vectors.json, then merged with latest client branch observations when available'
      - 'mission branch base metadata resolution: project-configured base first, then the primary resource main worktree checkout for pending branches, with prepared branches tied to the runner-recorded baseBranch payload'
      - 'on-demand branch-action git mutations (POST /api/missions/:id/branch/action: merge-with-parent / push-parent / publish) run host-side against worktrees under ~/.ovld/worktrees and the resource selected by optional resourceKey, defaulting to the primary repo; the Runner Layer owns launching the agent into a worktree, not these mutations'
      - 'REST auth integration points'
      - 'desktop OAuth handoff: browser-only GET /api/auth/desktop/github starts only the configured GitHub provider with the fixed desktop callback, so Better Auth writes its OAuth state cookie in the system browser; GET /api/auth/desktop/callback derives a short-lived opaque ticket from an authenticated browser session and redirects only to overlord://auth/callback; POST /api/auth/desktop/exchange consumes it once and returns a Better Auth session token only to the Electron main process'
      - 'hosted-web OAuth handoff: browser-only GET /api/auth/browser/callback accepts only a configured trusted web origin, derives a short-lived opaque ticket from an authenticated browser session, and redirects to that origin; POST /api/auth/browser/exchange consumes it once and returns a Better Auth session token to the web client without placing a credential in the callback URL'
      - 'SSE/WebSocket realtime endpoint (GET /realtime, compatibility GET /api/stream) and GET /sync/changes?after=<seq> catch-up read; both aggregate current readable memberships, filter before EntityChangeDto projection, expose workspaceId, and advance the global cursor past filtered rows'
      - 'SQL Studio launch metadata exposed through /api/meta'
      - 'webhook subscription management (/api/webhooks*: list/create, update/soft-delete, rotate-secret, test, deliveries, redeliver), gated by webhook:* permissions'
      - 'in-process webhook dispatcher (backend/webhook-dispatcher.ts), a RealtimeHub-style singleton polling loop claiming outbox_messages rows and delivering HMAC-signed HTTP POSTs; SSRF guards (https-only, private-network block) apply to external endpoints, with an OVERLORD_WEBHOOK_INTERNAL_HOSTS allowlist (plus implicit localhost in Local edition) exempting colocated consumers'
      - 'full mission.delivered webhook envelopes include the normalized delivery.report projection without exposing raw deliveries.payload_json; thin envelopes remain identifier/link-only'
      - 'in-process delivery composition worker (backend/delivery-compose-worker.ts) claiming overlord.delivery.compose.v1 worker_jobs, calling the compose-delivery automation, and updating deliveryReport.presentation with entity_changes(entity_type=delivery)'
      - 'organization management endpoints: list organizations for the caller, update an organization (org-admin gated), list/add/remove organization admins (add/remove maintains the invariant that an org admin is ADMIN of every constituent workspace)'
      - 'shared onboarding endpoint (POST /api/onboarding, zero-membership users only): creates an organization, a default workspace, membership, and ADMIN role in one transaction; used verbatim by the web onboarding screen and the ovld org-setup CLI command'
      - 'project APIs support explicit target workspace context for multi-workspace organization UIs: CreateProjectBody.workspaceId and GET /api/workspaces/:id/statuses'
      - 'project list lifecycle filtering: GET /api/projects and GET /api/workspaces/:id/projects default to active projects and accept lifecycle=active|archived|all; lifecycle selection never changes project-read authorization'
      - "workspace agent catalog and launch-settings management uses only workspace-scoped routes under /api/workspaces/:id, authorized against the target workspace's own membership (launch:read to view, launch:configure to mutate; non-membership reads as 404)"
      - 'authenticated default-project preference routes GET/PUT/DELETE /api/profile/default-project use the account-wide project_user_preferences.preferences_json.overlord.defaultProject marker; it grants no access and defaultProjectId is additive on /api/meta'
      - "resource-owned REST and extension operations derive the named resource's workspace and the caller's matching workspace_users membership before authorization, persistence, external-provider access, and entity_changes attribution; account-wide reads aggregate authorized memberships server-side and parentless creates name a workspace when ambiguous"
      - "workspace execution-target projection: GET /api/workspaces/:id/execution-targets returns all non-deleted target identity/status/owner display metadata, reachability, and active workspace-member access count to an authenticated member; never connection_json, credentials, target registration, creation, or access mutation; project selection remains limited to the acting member's eligible targets. Workspace admins may rename a target label via PATCH /api/workspaces/:id/execution-targets/:targetId { label }"
      - 'storage routes for the organization-images bucket key (/api/storage/organization-images/…) with a PUBLIC organization_image:read grant'
      - 'hosted MCP OAuth endpoints: POST /oauth/register, POST /oauth/token, POST /oauth/revoke, GET /oauth/authorize, POST /oauth/authorize/request, POST /oauth/authorize/approve'
      - 'versioned virtual-target gateway route family (/api/virtual-targets/v1/*): PUT …/registration, POST …/claim, POST …/requests/:id/progress, POST …/requests/:id/launched, POST …/requests/:id/failed, POST …/grants/:id/exchange, GET …/missions/:id/resources, POST …/missions/:id/actions; owns DTO shapes, target-authenticated auth/RBAC, per-request idempotency, and bounded/redacted output; the immutable VirtualExecutionQueueItemV1 payload + digest are built by the service layer at queue time and returned only to the authenticated claiming gateway; local /api/runner/* routes are unchanged'
    dependsOn:
      - database
      - auth
    interactionSurfaces:
      - restApiToDatabase
      - virtualGatewayToRest

  auth:
    label: 'Auth Layer'
    stableIdentifier: auth
    referenceSpecs:
      - 'planning/feature-plans/07-user-token-authentication.md'
      - 'planning/feature-plans/08-role-based-access-control.md'
    owns:
      - 'token creation, rotation, revocation, tombstoning of revoked credentials, and hash storage'
      - 'role assignment CRUD'
      - 'permission check interface'
      - 'audit log attribution fields'
      - 'Better Auth implementation tables: user, session, account, verification, apikey'
      - 'self-service account deletion trigger (user.deleteUser), delegating the cascade to a backend-supplied callback'
      - 'sign-up/sign-in email verification via an optional backend-supplied sendVerificationEmail callback (Resend-backed, RESEND_API_KEY, notifications.cooperativ.io); disabled by default when unset'
      - 'hosted MCP OAuth consent and token issuance: browser approval creates scoped mission_lifecycle USER_TOKEN access tokens; authorization codes are short-lived, single-use, PKCE-protected, and resource-bound; refresh tokens are not issued through contract version 2'
    dependsOn:
      - database
    interactionSurfaces:
      - authToDatabase

  automations:
    label: 'Automations Layer'
    stableIdentifier: automations
    referenceSpec: 'automations/docs/01-automations-overview.md'
    owns:
      - 'Automation interface and built-in automation registry'
      - 'Gemini provider configuration and client lifecycle'
      - 'reference summarization automations and objective title automation'
      - 'compose-delivery automation: schema-constrained Gemini presentation for delivery reports with null fallback'
      - 'fire-and-forget automation helpers with caller-supplied persistence callbacks'
      - 'downstream automation loading via OVERLORD_AUTOMATIONS_MODULE (custom-automation extension point)'
    dependsOn: []
    interactionSurfaces:
      - serviceToAutomations

  extension:
    label: 'Extension System'
    stableIdentifier: extension
    referenceSpecs:
      - 'planning/feature-plans/09-database-schema-contract.md'
      - 'planning/feature-plans/agent-harness-configuration-architecture.md'
    referenceSection: 'Extension Points'
    owns:
      - 'user_harness_extensions authoring workflow'
      - 'workspace_harness_extensions catalog promotion workflow'
      - 'extension table namespace: ext_<name>_'
      - 'extension migration component naming: ext:<name>'
      - 'namespaced JSON metadata keys inside core tables'
    dependsOn:
      - database
    interactionSurfaces:
      - extensionToCore

  desktop:
    label: 'Desktop Shell'
    stableIdentifier: desktop
    referenceSpec: 'desktop/docs/desktop-app.md'
    optional: true
    owns:
      - 'Electron app/window lifecycle and the hardened BrowserWindow security baseline (contextIsolation, sandbox, nodeIntegration: false, preload)'
      - 'profile-scoped CSP (loopback in Local mode; remote REST + wss origins added in Remote mode), single-instance lock, shell-local navigation guard, external-navigation handling'
      - 'process supervision of the bundled web/REST server (Node utilityProcess) in Local mode only; Remote mode does not fork the embedded server'
      - 'backend profiles ({ id, label, mode: local|remote, backendUrl } + active id) in userData/settings.json, per-profile Electron session partitions (persist:backend-<id>), per-backend bearer-token storage via safeStorage, and the reload-and-login switcher / first-run chooser (additive; Local is the default unchanged behavior)'
      - 'the minimal window.overlord preload bridge surface (feature-detected by the SPA, never required by it), incl. getActiveBackend/listBackends/addBackend/removeBackend/switchBackend/writeProjectMetadata/invokeLocalTarget and runnerService.{getStatus,install,start,stop,restart,uninstall} which drive the CLI-owned ovld runner service operations as a subprocess without supervising the runner itself'
      - 'remote OAuth callback: handles overlord://auth/callback only in Electron main, exchanges its opaque short-lived ticket with the active backend, and writes the resulting Better Auth session token through per-profile safeStorage; no token crosses the preload bridge'
      - 'desktop packaging metadata and the build/sign/notarize pipeline (electron-builder, entitlements, app-data layout)'
    dependsOn:
      - rest
      - cli
      - runner
      - auth
    interactionSurfaces:
      - shellToRest
      - shellToCli

  mcp:
    label: 'MCP Server'
    stableIdentifier: mcp
    referenceSpec: 'mcp/README.md'
    optional: true
    owns:
      - 'hosted MCP endpoint path: GET/POST /mcp'
      - 'supported MCP protocol version advertisement'
      - 'MCP tool names, input/output schemas, safety annotations, MCP Apps resource URI patterns, prompt names, and MCP JSON-RPC response shaping'
      - 'public ChatGPT mission-first surface: project resolution/selection, mission search/context reads, explicit mission/session writes, and presentation-only widget resources'
      - 'OAuth protected-resource metadata for the hosted MCP resource'
      - 'mapping MCP tool calls to existing service/protocol operations'
    dependsOn:
      - auth
      - protocol
      - database
    interactionSurfaces:
      - mcpToAuth
      - mcpToService

# Interaction surfaces — the only sanctioned paths between components
interactionSurfaces:
  agentToProtocol:
    description: 'Agents invoke ovld protocol subcommands via subprocess CLI'
    from: agent
    to: protocol
    transport: subprocess-cli
    authMechanism: session-key-flag
    requiredSequence: 'attach → (update|heartbeat)* → (ask|deliver)'
    responseFormat: json-stdout
    errorSignal: non-zero-exit
    shellSpecialHandling: '--summary-file - / --payload-file - with heredoc'

  protocolToDatabase:
    description: 'Protocol layer reads and writes via service layer only — no direct table access'
    from: protocol
    to: database
    transport: service-layer-function-calls
    rules:
      - 'No direct table writes from protocol handlers'
      - 'All mutations in ACID transactions'
      - 'Optimistic concurrency: revision compare-and-set; zero-row update = 409'
      - 'entity_changes appended in same transaction as domain mutation'
      - 'enqueueWebhookEvent() (packages/core/service/webhook-events.ts) appends matching outbox_messages rows in the same transaction as the domain mutation, called from both the protocol service core and the REST data layer — a second shared-single-writer rule alongside insertEntityChange'
      - 'Protocol-scope idempotency keys in idempotency_keys table'

  cliToRest:
    description: 'Published CLI commands call the configured backend over HTTP instead of opening the database'
    from: cli
    to: rest
    transport: http-json
    rules:
      - 'CLI must not import database adapters or service internals'
      - 'Backend URL comes from backend_url (loopback for Local, HTTPS for Cloud); a container/agent-pod CLI consumes the injected runtime OVERLORD_BACKEND_URL and must not persist config'
      - 'Mutations go through backend endpoints that own persistence and idempotency'
      - 'Cloud/headless runners authenticate with scoped service tokens that can claim only their own target/workspace requests'

  connectorToProtocol:
    description: 'Connector hook scripts invoke protocol commands via subprocess'
    from: connector
    to: protocol
    transport: shell-script-subprocess
    rules:
      - 'Hook scripts must not write to the database directly'
      - 'Hook scripts must use ovld protocol hook-event or update'
      - 'Hooks may not add new event types without contract update'
      - 'UserPromptSubmit follow-up capture records user_follow_up activity without requiring a live session and without reopening execution'

  runnerToRest:
    description: 'CLI runner claims/updates execution requests through backend APIs, then launches agents locally'
    from: runner
    to: rest
    transport: http-json
    rules:
      - 'Runner queue endpoints are GET /api/runner/status, POST /api/runner/claim, POST /api/runner/clear, POST /api/runner/requests/:id/launching, POST /api/runner/requests/:id/launched, POST /api/runner/requests/:id/failed, and POST /api/missions/:id/branch-prepared'
      - 'Backend claim endpoint must perform atomic compare-and-set on execution_requests'
      - 'Postgres claim waits use a dedicated non-pooled LISTEN connection for at most 25 seconds after an empty initial claim; queue notifications are wake hints only, followed by the same scoped authorized atomic claim. The additive response longPoll flag is true for this capability; SQLite responds immediately with longPoll false.'
      - 'Backend claim must set claimed_by_device_id, claimed_by_execution_target_id when known, and claim_expires_at'
      - 'Backend state transitions must append mission_events and entity_changes in the same transaction'
      - 'Allowed transitions are queued → claimed → launching → launched|failed; active requests may be cleared; stale claims and launched-without-attach requests may move to expired; other terminal statuses are sinks unless a new request is explicitly queued'
      - 'Protocol attach links execution_requests.launched_session_id when launch context supplies an execution request id'
      - 'Runner launches agents locally after a successful claim'
      - 'Runner reports launching/launched/failed state back through backend endpoints'
      - 'Runner claims and launches only local/device execution targets; virtual targets are claimed and realized by an external gateway over virtualGatewayToRest, and resolveWorkingDirectory never runs for a virtual claim'

  virtualGatewayToRest:
    description: 'An external Virtual Target Gateway (e.g. Racecar) claims and realizes virtual execution requests through the documented REST surface only — never the database'
    from: gateway
    to: rest
    transport: https-json
    authMechanism: target-scoped-gateway-principal
    routeFamily: '/api/virtual-targets/v1/*'
    rules:
      - "A gateway principal is scoped to exactly one execution_targets row of type virtual (target-authenticated, not device-authenticated); it cannot enumerate, claim, or observe another target's work"
      - 'claimed_by_execution_target_id is the universal claimant identity; claimed_by_device_id stays nullable for virtual claims'
      - 'PUT …/registration registers/refreshes gateway identity (gateway_key, gateway_instance_id), capabilities, supported agents, supported queue schema versions, adapter key/version, and heartbeat; a matching stable gateway identity replaces rather than creates a target'
      - "POST …/claim atomically claims a queued request for the caller's target and returns the immutable VirtualExecutionQueueItemV1 snapshot, claimId, expiry, and only request-scoped opaque launch-grant references — never filesystem paths or raw secrets; replaying the same gateway+request returns the same claim and payload"
      - 'POST …/requests/:id/progress appends a bounded, monotonic preparation observation and does not change status'
      - 'POST …/requests/:id/launched validates request/claim/target/digest, records VirtualTargetLaunchObservationV1, then makes the normal launching → launched transition exactly once'
      - 'POST …/requests/:id/failed records a typed, redacted VirtualTargetFailureV1 and makes the allowed transition to failed; retryable informs retry policy but does not itself requeue'
      - 'progress/launched/failed are idempotent by request and observation sequence'
      - "POST …/grants/:id/exchange swaps an authenticated, unexpired opaque grant for narrowly scoped credentials/attachment-download access bound to request+target+gateway instance; every exchange is audited and never returns the user's Overlord token"
      - 'GET …/missions/:id/resources returns summarized opaque lifecycle resources and source-compatibility observations; POST …/missions/:id/actions authorizes an explicit start/stop/archive/delete/enqueue/retry/dequeue action and delegates it; delegated-action output becomes an observation and can never change mission completion'
      - 'The gateway must never access the database directly; it must be idempotent by executionRequestId, and it must not introduce a parallel request state machine'

  restApiToDatabase:
    description: 'REST handlers use service layer after auth check'
    from: rest
    to: database
    transport: service-layer-function-calls
    rules:
      - 'Auth check via Auth Layer before any service call'
      - 'Same service layer as CLI and Protocol Layers'
      - 'Idempotency keys for retried writes'
      - 'Response shapes use camelCase logical field names'

  mcpToAuth:
    description: 'Hosted MCP requests authenticate through the Auth Layer before tool listing or invocation'
    from: mcp
    to: auth
    transport: http-bearer
    authMechanism: oauth-bearer-token
    discoveryEndpoints:
      - 'GET /.well-known/oauth-protected-resource'
      - 'GET /.well-known/oauth-protected-resource/mcp'
      - 'GET /.well-known/oauth-authorization-server'
    authorizationEndpoints:
      - 'POST /oauth/register'
      - 'GET /oauth/authorize'
      - 'POST /oauth/token'
      - 'POST /oauth/revoke'
      - 'POST /oauth/authorize/request'
      - 'POST /oauth/authorize/approve'
    rules:
      - 'MCP handlers must resolve the caller through the Auth Layer before listing or invoking tools'
      - 'Missing or failed authentication returns an OAuth-compatible WWW-Authenticate: Bearer challenge'
      - 'MCP authentication resolves the profile/credential without selecting an ambient workspace; resource operations derive scope and account-wide tools aggregate authorized memberships'
      - 'OAuth approval creates mission_lifecycle-scoped USER_TOKEN access tokens and does not issue refresh tokens through contract version 2'
      - 'OAuth resource parameters, when supplied, are bound through approval and token exchange to the canonical hosted /mcp resource; mismatches return invalid_target'

  mcpToService:
    description: 'MCP tool handlers call existing service/protocol functions and never write tables directly'
    from: mcp
    to: database
    transport: service-layer-function-calls
    rules:
      - 'MCP handlers must not read or write database tables directly'
      - 'Every tool call must pass through the same RBAC gates as the corresponding REST or protocol operation'
      - 'Mission creation tools require explicit projectId or a prior resolved project identity; missing or ambiguous project context is a tool error'
      - 'Hosted MCP must not expose local filesystem/worktree inspection, runner queue claiming, execution target mutation, or branch-action tools'
      - 'MCP Apps widget resources use ui://overlord/* URIs, self-contained HTML, and associated tool structuredContent only; no third-party frames, secrets, or unrestricted network access'

  authToDatabase:
    description: 'Auth layer accesses auth tables via the configured Better Auth database adapter; reads role_assignments and workspace_users for identity bridging'
    from: auth
    to: database
    transport: configured-better-auth-adapter-and-direct-query
    rules:
      - 'Auth tables (user, session, account, verification, apikey) are auth-internal; no other component reads them directly'
      - 'Identity bridge reads profiles where profiles.id matches the Better Auth user id, then resolves workspace_users only for explicit resource/workspace scope or account-wide aggregation'
      - 'Role resolution reads role_assignments by resource-derived or explicit workspace_user_id and workspace_id; no cookie or request header selects membership'
      - 'Auth Layer must not write to core domain tables (missions, projects, etc.) itself'
      - 'Exception: the deleteUser beforeDelete hook invokes a backend-supplied onDeleteUser(userId) callback (see backend/account-deletion.ts) to hard-purge the RESTRICT children of profiles and workspace_users (workspace_users, user_tokens, user_images, role_assignments, workspace_user_execution_targets, project_user_preferences) before the auth user row is hard-deleted; the write happens in the caller-supplied callback, not in Auth Layer code, mirroring the serviceToAutomations delegation pattern'

  serviceToAutomations:
    description: 'Service-layer callers invoke automations through exported functions; persistence via injected callbacks only'
    from: service
    to: automations
    transport: function-calls
    rules:
      - 'Automations must not read or write domain tables directly'
      - 'Provider secrets come from environment variables documented in .env.prod.example / .env.local.example'
      - 'Automations return null on provider unavailability or failure; callers supply deterministic fallbacks'
      - 'New built-in automations register through the automations registry, not ad hoc imports from other modules'
      - 'Downstream automations load via OVERLORD_AUTOMATIONS_MODULE (custom-automation extension point), not by editing the built-in registry'

  extensionToCore:
    description: 'Extensions interact with core only through service APIs and change feed'
    from: extension
    to: database
    transport: service-layer-apis-entity-changes-outbox
    rules:
      - 'No direct writes to core tables'
      - 'Extension tables must use ext_<name>_ prefix'
      - 'Migration component must be ext:<name>'
      - 'JSON metadata keys must be namespaced (reverse-DNS or package-style)'
      - 'Reactions to core events via service APIs, entity_changes, or outbox_messages only'

  shellToRest:
    description: "The desktop shell's BrowserWindow loads the SPA and calls /api/* (incl. SSE realtime) over the loopback origin (Local) or the hosted backend's HTTPS/wss origin (Remote) via the SPA's runtime-injected API base URL — another HTTP client of the existing REST surface"
    from: desktop
    to: rest
    transport: loopback-or-https-http-and-sse
    rules:
      - 'The shell must not fork or modify the SPA'
      - 'Local mode: Better Auth session cookies work natively on the shared loopback origin; the shell injects no headers and stores no tokens for in-app requests'
      - 'Remote mode (cross-origin): only the active profile Better Auth session bearer token (safeStorage/keychain) is injected into the SPA API and realtime clients instead of cross-site cookies; the desktop never reads or mints USER_TOKENs for in-app requests, while spawned CLI/headless clients retain their separate USER_TOKEN credential. Selected workspace remains client-side navigation state and is never sent as request scope'
      - 'Navigation stays scoped to the shell origin in both modes; the remote REST + wss origins are added to CSP connect-src per the active profile'
      - 'Desktop-only affordances are exposed only via the feature-detected window.overlord preload bridge'
      - 'Remote social OAuth uses an opaque, single-use, short-lived handoff ticket between the backend callback and Electron main; the custom URL and renderer never receive a session, bearer, GitHub access token, or client secret'

  shellToCli:
    description: 'The desktop shell supervises the bundled CLI/server as subprocesses (ovld serve / runner / launch), analogous to the Agent -> Protocol subprocess pattern'
    from: desktop
    to: cli
    transport: subprocess-and-utility-process
    rules:
      - 'The shell triggers existing CLI/runner behavior; it must not reimplement launch, terminal, or config logic owned by the CLI/Runner Layers'
      - 'Spawned CLI needing a network credential receives a USER_TOKEN via Overlord_USER_TOKEN; pure-loopback execution needs none'
      - 'The web/REST server is forked as a Node utilityProcess (Electron ABI), not a separately shipped Node runtime'
