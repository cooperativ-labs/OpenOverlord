# Overlord Protocol Command Surface
# Machine-readable counterpart to planning/feature-plans/03-agent-protocol.md
#
# This file defines the stable command names, required flags, response shape versions,
# and declared side effects. Full parameter detail is in the reference spec.
#
# IMPORTANT: Any addition, rename, or flag change to a command in this file requires
# a contract version update in CONTRACT.md and components.yaml.
#
# Local-only `ovld protocol <subcommand>` commands that never cross the CLI -> backend
# HTTP surface (no POST /api/protocol/<subcommand>, no backend handler, no permission
# entry) are intentionally not listed here: `record-touched` and `changes`. See
# CONTRACT.md's contract-version-2 changelog entry for the precedent.

contractVersion: '2'
referenceSpec: 'cli/docs/03-agent-protocol.md'

# Transport-level shape shared by every protocol command, independent of subcommand.
requestEnvelope:
  fileInputs:
    description: "Per-flag map of resolved --*-file payloads: { '--summary-file': '<content>', '--change-rationales-file': '<content>', ... }. The client CLI resolves EACH --*-file flag independently so multiple file payloads in one invocation no longer collide on a single field."
    rules:
      - "At most one --*-file flag may use literal '-' (true stdin) per invocation; passing two stdin flags fails fast on the client with a CliError naming the offending flags. Real file paths are unlimited."
      - "Backward compatible: the legacy single `stdin` field is still populated for the lone '-' payload and still honored by the backend when `fileInputs` lacks an entry for a flag."
    backwardCompatible: true
  changeRationaleInput:
    description: 'Shape of each --change-rationales entry on deliver, update, record-change-rationales, and record-work.'
    requiredFields:
      - file_path
      - label
      - summary
      - why
      - impact
    fieldAliases:
      filePath: 'Accepted as an alias for file_path and normalized to the canonical snake_case shape, so an entry keyed by the camelCase changed-files casing no longer fails validation. file_path is the documented canonical form.'
    backwardCompatible: true
  changedFileInput:
    description: 'Shape of each --changed-files entry on deliver and update.'
    requiredFields:
      - filePath
    optionalFields:
      - vcsStatus
      - attribution
      - claimedByMissionIds
    notes:
      - "attribution ('mine' | 'claimed' | 'unclaimed') and claimedByMissionIds are computed client-side from the touched-files log and peer sessions' claims (cli/src/vcs.ts). Never persisted server-side; used only to classify a residual missing_rationale error (coo:127 Layer 4)."
    backwardCompatible: true

sessionLifecycle:
  attach:
    description: 'Start a working session; return full structured mission context plus agent instructions'
    requiredFlags:
      - --mission-id
    optionalFlags:
      - --session-key
      - --execution-request-id
      - --execution-target-id
    returnsSessionKey: true
    responseShape: attach-response-v3
    clientCapture:
      - 'The client CLI records a VCS baseline (changed file paths from git status) for the working directory so deliver can compute the run-attributable changed-file delta. VCS is read on the client only; best-effort and skipped outside a git repo.'
    sideEffects:
      - creates-agent-session
      - objective-state-to-executing

  update:
    description: 'Post progress event; optionally record changed files and rationales'
    requiredFlags:
      - --mission-id
    requiresSessionKey: true
    optionalFlags:
      - --summary
      - --summary-file
      - --phase
      - --event-type
      - --payload-json
      - --payload-file
      - --external-url
      - --external-session-id
      - --track-changed-files
      - --changed-files-json
      - --changed-files-file
      - --change-rationales-json
      - --change-rationales-file
      - --begin-follow-up-work
      - --follow-up-intent
    validPhases:
      - draft
      - execute
      - review
      - deliver
      - complete
      - blocked
      - cancelled
    validEventTypes:
      - update
      - user_follow_up
      - alert
      - discussion_summary
      - decision
    sideEffects:
      - appends-mission-event
      - upserts-changed-files-by-session-objective-path

  hookEvent:
    description: 'Record connector lifecycle events such as UserPromptSubmit without requiring a live agent session'
    requiredFlags:
      - --hook-type
      - --mission-id
    optionalFlags:
      - --session-key
      - --external-session-id
      - --prompt
      - --prompt-file
      - --turn-index
    validHookTypes:
      - UserPromptSubmit
    sideEffects:
      - appends-mission-event-type-user-follow-up
    rules:
      - 'UserPromptSubmit records discussion activity and does not reopen objective execution'
      - 'Expired delivered sessions may be used for attribution but must not reject follow-up capture'

  resumeFollowUp:
    description: 'Explicitly reopen a completed objective for post-delivery implementation follow-up'
    requiredFlags:
      - --mission-id
    optionalFlags:
      - --objective-id
      - --agent
      - --model
      - --external-session-id
      - --summary
      - --summary-file
    returnsSessionKey: true
    responseShape: attach-response-v3
    sideEffects:
      - creates-agent-session
      - objective-state-complete-to-pending-delivery
      - mission-status-to-execute
      - appends-mission-event

  heartbeat:
    description: 'Update session liveness without creating a mission event'
    requiredFlags:
      - --mission-id
    requiresSessionKey: true
    optionalFlags:
      - --phase
      - --percent
      - --note
    sideEffects:
      - updates-session-last-heartbeat-only
      # Does NOT create a mission_events row

  ask:
    description: 'Post a single blocking question and stop work'
    requiredFlags:
      - --mission-id
    requiresSessionKey: true
    questionInput:
      flag: --question
      fileAlternative: --question-file
    rules:
      - 'Agent MUST stop after calling ask'
      - 'Ask exactly one blocking question per call'
    sideEffects:
      - appends-mission-event-type-ask

  deliver:
    description: 'Final delivery — mark objective complete and move mission to review'
    requiredFlags:
      - --mission-id
    requiresSessionKey: true
    summaryInput:
      flag: --summary
      fileAlternative: --summary-file
    optionalFlags:
      - --artifacts
      - --change-rationales-json
      - --change-rationales-file
      - --changed-files-json
      - --changed-files-file
      - --observed-dirty-paths-json
      - --no-file-changes
      - --skip-rationale-for-json
      - --skip-rationale-for-file
      - --payload-json
      - --payload-file
      - --verification-summary
      - --follow-up-notes
    clientCapture:
      - 'The client CLI auto-injects --changed-files-json at deliver from the run-attributable VCS delta (current changed paths minus the baseline captured at attach/resume-follow-up). VCS is read on the client only.'
      - 'The client CLI auto-injects --observed-dirty-paths-json at deliver: the full current dirty worktree (not just the run-attributable delta), used only for server-side coverage reconciliation (see reconciliation rule below). Additive/optional — omitted by older clients.'
    validationRules:
      - 'Meaningful tracked changed files require rationales'
      - '--payload-json / --payload-file may carry an additive deliveryReport object with schemaVersion: 1 and agentReport.{humanActions,tradeoffsMade,knownRisks,deferredWork,assumptions}; omitted evidence normalizes to empty arrays and can never prevent delivery'
      - 'Human actions are bounded and filter Git operations plus routine review/testing instructions before they are persisted in deliveryReport.presentation'
      - 'deliveryReport.presentation starts as an immediate deterministic/pending fallback; a durable overlord.delivery.compose.v1 worker job may asynchronously replace only presentation while delivery success and latency never depend on an automation provider'
      - 'Rationale coverage is objective-scoped: aggregated across all sessions for the objective (and no-session record-work records)'
      - '--no-file-changes asserts this run changed no files and skips rationale-coverage enforcement'
      - '--skip-rationale-for-json / --skip-rationale-for-file lists per-file rationale overrides for changes the agent did not make; each entry requires file_path (filePath alias accepted) and a non-empty reason string'
      - "When --observed-dirty-paths-json is present, changed_files rows for the objective that are current_diff_state='present' but whose path is absent from it are reconciled to current_diff_state='resolved' before coverage is computed, un-poisoning coverage from a past over-attribution (coo:127 Layer 4). 'resolved' is an existing changed_files vocabulary value (database/docs/09-database-schema-contract.md), not a new one."
      - "A missing_rationale failure (code missing_rationale, HTTP 400) carries a structured details.missingRationales array: [{ filePath, classification: 'mine'|'claimed'|'unclaimed', suggestedSkip: { filePath, reason } | null }]. classification is derived from the attribution attached to the corresponding --changed-files-json entry (default 'unclaimed' when absent); suggestedSkip is null for 'mine' (a rationale is owed, not a skip)."
      - 'Delivery is the final work boundary — no implementation after delivery without explicit follow-up'
    skipRationaleForInput:
      description: 'Shape of each --skip-rationale-for entry on deliver.'
      requiredFields:
        - file_path
        - reason
      fieldAliases:
        filePath: 'Accepted as an alias for file_path and normalized to the canonical snake_case shape.'
      backwardCompatible: true
    sideEffects:
      - upserts-changed-files-by-session-objective-path
      - reconciles-stale-changed-files-to-resolved-when-observed-dirty-paths-provided
      - stores-delivery-record
      - objective-state-to-complete
      - mission-status-to-review
      - may-trigger-auto-advance-for-next-objective

missionDiscovery:
  create:
    description: 'Create a draft mission and objective without attaching'
    sideEffects:
      - creates-mission
      - creates-objective-in-draft-state

  prompt:
    description: 'Create a mission and immediately attach or queue execution'
    sideEffects:
      - creates-mission
      - attaches-or-queues-execution

  loadContext:
    description: 'Read mission context without creating a session'
    readOnly: true
    optionalFlags:
      - --execution-target-id

  connect:
    description: 'Create a lightweight session key without full context assembly'
    sideEffects:
      - creates-session-key

  searchMissions:
    description: 'Search by query, status, project, creator, and update dates'
    readOnly: true

  discussObjective:
    description: 'Mark a draft objective submitted (signals in active discussion)'
    sideEffects:
      - objective-state-draft-to-submitted

  addObjectives:
    description: 'Append ordered objectives to an existing mission'
    sideEffects:
      - creates-objectives-in-draft-state

  recordWork:
    description: 'Record already-completed chat work as a review mission without an attached session'
    rules:
      - 'For work already done in chat, not for in-progress work'
    sideEffects:
      - creates-mission-in-review-status
      - creates-completed-objective
      - creates-delivery-record-without-session-attribution

sharedContext:
  readContext:
    readOnly: true

  writeContext:
    sideEffects:
      - upserts-shared-context-entry-by-mission-and-key

  attachmentList:
    readOnly: true

  attachmentPrepareUpload:
    sideEffects:
      - creates-objective-attachment-record-in-prepared-state

  attachmentFinalizeUpload:
    sideEffects:
      - updates-attachment-upload-status-to-available

  attachmentDownloadUrl:
    readOnly: true

  attachmentUploadFile:
    description: 'One-command local attachment upload (prepare + upload + finalize)'
    sideEffects:
      - creates-and-finalizes-attachment

managementSurfaces:
  runnerQueue:
    description: 'Runner queue/device/project-resource operations are management surfaces, not ovld protocol commands.'
    owner: 'runner'
    transport: 'Runner -> REST'
    endpoints:
      - 'GET /api/runner/status'
      - 'POST /api/runner/claim'
      - 'POST /api/runner/clear'
      - 'POST /api/runner/requests/:id/launching'
      - 'POST /api/runner/requests/:id/launched'
      - 'POST /api/runner/requests/:id/failed'
      - 'POST /api/missions/:id/branch-prepared'
    rules:
      - 'ovld runner uses these REST endpoints through the configured backend.'
      - 'Agents use attach/update/heartbeat/ask/deliver for mission lifecycle work.'
  projectResources:
    description: 'Project/resource setup is exposed through top-level CLI management commands and REST project endpoints, not ovld protocol commands.'
    examples:
      - 'ovld create-project --name <name>'
      - 'ovld add-cwd --project-id <id-or-name>'

authAndDiscovery:
  authStatus:
    description: 'Report local runtime readiness and auth mode without printing secrets'
    readOnly: true

  discoverProject:
    description: 'Resolve project from CWD, explicit directory, or project identifier'
    readOnly: true

  listOrganizations:
    description: 'List workspace (MVP: returns local instance workspace)'
    readOnly: true

# Stable response shape versions
# Add a new version key here when the shape changes in a backward-incompatible way

responseShapes:
  # attach-response-v1 (superseded by v2 in contract version 4). Retained for
  # historical reference. v1 exposed a single top-level `objectives` array that
  # included the current objective.
  attach-response-v1:
    description: 'Response shape returned by the attach command (superseded by attach-response-v2)'
    requiredTopLevelFields:
      - history
      - artifacts
      - attachments
      - objectives
      - session
      - sharedState
      - promptContext
    sessionRequiredFields:
      - sessionKey
      - state
    objectivesRequiredFields:
      - id
      - objective
      - state
      - position
    promptContextRequiredContent:
      - task title
      - mission ID
      - objective ID
      - objective instruction text
      - recent activity/history
      - required protocol workflow instructions
    promptContextOptionalContent:
      - constraints
      - acceptance criteria
      - available tools
      - output format
      - attachments
      - artifacts
      - shared context
      - user custom agent instructions

  attach-response-v2:
    description: >-
      Response shape returned by the attach and resume-follow-up commands.
      Replaces the single `objectives` array with two disjoint arrays that both
      exclude the current objective: `previousObjectives` (positioned before the
      current objective) and `futureObjectives` (positioned after). The current
      objective is carried only in the top-level `objective` field.
    requiredTopLevelFields:
      - history
      - artifacts
      - attachments
      - previousObjectives
      - futureObjectives
      - session
      - sharedState
      - promptContext
    sessionRequiredFields:
      - sessionKey
      - state
    # Applies to entries in both previousObjectives and futureObjectives.
    objectivesRequiredFields:
      - id
      - objective
      - state
      - position
    # The current objective is excluded from previousObjectives and futureObjectives.
    objectivesExcludeCurrent: true
    promptContextRequiredContent:
      - task title
      - mission ID
      - objective ID
      - objective instruction text
      - recent activity/history
      - required protocol workflow instructions
    # Recent activity/history rendered into promptContext excludes operational
    # lifecycle event types so the agent sees only substantive events.
    promptContextHistoryExcludedEventTypes:
      - status_change
      - execution_requested
      - awaiting_approval
    promptContextOptionalContent:
      - constraints
      - acceptance criteria
      - available tools
      - output format
      - attachments
      - artifacts
      - shared context
      - user custom agent instructions

  attach-response-v3:
    description: >-
      Response shape returned by the attach and resume-follow-up commands.
      Replaces the human-readable `promptContext` field from attach-response-v2
      with `agentInstructions`. Mission context lives in the structured top-level
      fields (`mission`, `objective`, `previousObjectives`, `futureObjectives`,
      `history`, `attachments`, `artifacts`, and `sharedState`). `agentInstructions`
      is intentionally concise workflow guidance for agents that attach without
      a richer launch prompt. Contract version 1 keeps this v3 shape and adds
      optional resource-binding metadata: `projectResources` at the top level and
      `resourceKey` on current/previous/future objective summaries.
    requiredTopLevelFields:
      - history
      - artifacts
      - attachments
      - previousObjectives
      - futureObjectives
      - session
      - sharedState
      - agentInstructions
    optionalTopLevelFields:
      projectResources: 'Project resource manifest for the current execution target, grouped by logical resource key.'
    sessionRequiredFields:
      - sessionKey
      - state
    objectivesRequiredFields:
      - id
      - objective
      - state
      - position
    objectivesOptionalFields:
      - resourceKey
    objectivesExcludeCurrent: true
    agentInstructionsRequiredContent:
      - mission ID
      - objective ID
      - objective title or fallback label
      - location of objective details in the structured JSON
      - required protocol workflow instructions
    agentInstructionsOptionalContent:
      - user custom agent instructions
